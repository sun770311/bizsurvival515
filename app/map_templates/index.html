<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>NYC Business Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css"
    rel="stylesheet"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f5f6f8;
    }

    .app-shell {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    .sidebar {
      width: 320px;
      min-width: 320px;
      max-width: 320px;
      background: rgba(255, 255, 255, 0.98);
      border-right: 1px solid #d9dde3;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.06);
      z-index: 2;
      overflow-y: auto;
      padding: 16px 14px 20px 14px;
      box-sizing: border-box;
    }

    .sidebar h2 {
      margin: 0 0 6px 0;
      font-size: 20px;
    }

    .sidebar-subtitle {
      margin: 0 0 12px 0;
      color: #374151;
      font-size: 14px;
      line-height: 1.45;
    }

    .sidebar-actions {
      margin-bottom: 12px;
    }

    .reset-button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: #ffffff;
    }

    .reset-button:hover {
      background: #1f2937;
    }

    #status {
      margin: 0 0 14px 0;
      font-size: 13px;
      color: #374151;
      white-space: pre-wrap;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px;
    }

    #filterPanel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .filter-group {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      background: #ffffff;
    }

    .filter-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #111827;
    }

    .filter-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #374151;
      cursor: pointer;
    }

    .map-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .popup-card {
      max-width: 380px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.45;
      padding-right: 4px;
      box-sizing: border-box;
    }

    .popup-card h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
      position: sticky;
      top: 0;
      background: #fff;
      padding-bottom: 6px;
    }

    .popup-section {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #ddd;
    }

    .license-record {
      margin-top: 10px;
      padding: 8px;
      background: #f7f7f7;
      border-radius: 6px;
    }

    .popup-label {
      font-weight: 700;
    }

    .status-active {
      color: #0a7f2e;
      font-weight: 700;
    }

    .status-inactive {
      color: #b42318;
      font-weight: 700;
    }

    .mapboxgl-popup-content {
      border-radius: 12px;
      padding: 12px;
    }

    @media (max-width: 900px) {
      .app-shell {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-width: 100%;
        max-width: 100%;
        height: 40vh;
        border-right: none;
        border-bottom: 1px solid #d9dde3;
      }

      .map-wrap {
        height: 60vh;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h2>NYC Business Map</h2>
      <p class="sidebar-subtitle">
        Click a point to view business details. Use the filters below to narrow
        the businesses shown on the map. Selecting multiple values within a
        filter applies OR logic.
      </p>

      <div class="sidebar-actions">
        <button id="resetFilters" class="reset-button" type="button">Reset filters</button>
      </div>

      <div id="status">Initializing map...</div>
      <div id="filterPanel"></div>
    </aside>

    <div class="map-wrap">
      <div id="map"></div>
    </div>
  </div>

  <script>
    window.__CONFIG__ = {
      MAPBOX_PUBLIC_TOKEN: "YOUR_MAPBOX_PUBLIC_TOKEN"
    };
  </script>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
  <script src="/app.js"></script>
</body>
</html>
