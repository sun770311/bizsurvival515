name: Build and Tests

on:
  push:
    branches: [ "main", "toml_file", "mapbox", "streamlit-app", "Feature/readme" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: bizsurvival
          environment-file: environment.yml
          auto-activate-base: false

      - name: Install package and dev dependencies
        run: |
          python -m pip install -e .[dev]

      - name: Verify Installation
        run: |
          pip show bizsurvival
          conda list

      - name: Run Pylint
        # This will now strictly enforce a 10/10 score. If it fails, the CI fails!
        run: |
          pylint app pipeline tests

      - name: Run Unittest & Coverage
        run: |
          coverage run -m unittest discover -s tests -v
          coverage report -m

      - name: Upload to Coveralls
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          coveralls
